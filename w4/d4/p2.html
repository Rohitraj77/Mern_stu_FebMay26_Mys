<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Detection and Switching</title>
</head>

<body>

<button id="detectBtn">Use browser language</button>

<select id="langSelect">
    <option value="kn">ಕನ್ನಡ</option>
    <option value="en">English</option>
    <option value="hi">हिंदी</option>
</select>

<h3 id="title"></h3>
<p id="desc"></p>
<pre id="out"></pre>

<script src="p2.js"></script>

</body>
</html>
