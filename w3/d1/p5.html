<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js objects, arrays</title>
</head>

<body>
    <pre id="out">

    </pre>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-blue-600">
        Run
    </button>
    <script>

        const out = document.getElementById("out");
        function print(...args) {
            // let b = 25; if we decalre it here there will be no issues
            // Console
            console.log(...args);
            out.textContent += args.join("") + "\n"
        }

        function clearOut() {
            out.textContent = "" //make clear everything in screen
        }
        function run() {
            clearOut();
            const user = {name: "Rohit",age: 23};
            print("user=",JSON.stringify(user))

            const myArray = [1,2,3,4];
            myArray.push(5);
            print("Is it the array:?",Array.isArray(myArray));
        }
        document.getElementById("runBtn").addEventListener("click", run);
    </script>
</body>

</html>
