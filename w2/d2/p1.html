<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
</head>
<body class="bg-yellow-200">
    <p class="text-cornflowerblue-200">Hello Tailwind CSS</p>
    <h2 class="text-blue-700 p-4 m-4">Utility class</h2>
    <h3 class="text-blue-700 pr-4 mt-4">Utility class</h3>
    <h4 class="text-red-500 px-6 py=6 mt-4">Utility class</h4>
    <div class="border-2 bg-red-100 border-green-400 rounded-full">Name</div>
    <p class="text-3xl">Rohit Raj M</p><!--sm/base/lg/xl/2xl/3xl-->
    <p class="text-bold">Rohit Raj M</p><!--light/normal/bold-->
    <p class="text-center">Rohit Raj M</p><!--left/center/right-->
    <button class="hover:text-red-500">submit</button>
    <!-- Success: green, error:red,warning/alert:yellow Info:blue -->
    <div class="bg-green-200 p-4">
        <p class="font-bold">This is success message</p>
    </div>
    <span class="inline-flex items-center bg-blue-200 text-blue-900 px-3 py-1 rounded-full">This is success message</span>
    <div class="border p-6 rounded">
        <h3 class="font-bold text-xl">card Title</h3>
        <p>This is simple description inside the card</p>
    </div>
</body>
</html>
