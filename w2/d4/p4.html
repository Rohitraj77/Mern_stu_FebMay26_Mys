<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dim Background</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <main class="max-w-4xl mx-auto p-6 space-y-8">
        <h1 class="text-2xl font-bold">Overlay text background</h1>
        <section class="border rounded p-6">
            <div class="grid md:grid-cols-2 gap-6">
                <div class="h-32 rounded bg-[linear-gradient(135deg,#275BC2,#CBDB40)]">
                    Card1
                </div>
                <div class="h-32 rounded bg-[linear-gradient(135deg,#275BC3,#CBDB24)]">
                    Card2
                </div>
                <p class="mt-4 text-lg">This is the content behind overlay</p>
            </div>
        </section>
        <div id="Overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
            <div class="w-[min(520px,92vw)] bg-white rounded p-6 shadow-lg">
                <h2 class="text-lg font-bold">My Modal window</h2>
                <p class="text-sm mt-2">Here is my second modal window that i created</p>
                <button id="closeBtn" class="px-4 py-3 rounded border
            hover: bg-red-100 transition">close</button>
            </div>
        </div>
    </main>

</body>
<script>
    // const closeBtn = document.getElementById("closeBtn");
    // closeBtn.addEventListener("click",()=>{
    //     overlay.classList.toggle("hidden");
    //     overlay.classList.toggle("block");
    //     const expanded=closeBtn.getAttribute("aria-expanded")=="true";
    //     closeBtn.setAttribute("aria-expanded",String(!expanded));
    //     // closeBtn.classList.toggle("hidden");
    //     // closeBtn.classList.toggle("block");
    //     // const expanded = closeBtn.getAttribute("aria-expanded")=="true";
    //     // closeBtn.setAttribute("aria-expanded",String(!expanded));
    // });
    const Overlay = document.getElementById('Overlay');

document.getElementById('closeBtn').addEventListener('click', () => {
    Overlay.classList.remove('flex');
    Overlay.classList.add('hidden');
});
    //click outside of the Modal to close it//
    Overlay.addEventListener('click',(e)=>{
        if(e.target === Overlay){
            Overlay.classList.remove('flex');
            Overlay.classList.add('hidden');
        }
    });
    
    </script>
</html>
