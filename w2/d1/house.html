<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House using relative positioning</title>
    <style>
        .house{
          position: relative;
          top: 345px;
          left: 700px;
          height: 270px;
          width: 225px;
          border: 4px solid black;
          background-color: red;
          margin-left: 65px;
            
        }
        .house-top{
            position: relative;
          top: 30px;
          left: 700px;
          height: 40px;
          width: 350px;
          border: 4px solid black;
          background-color: yellow;
        }
        .house-window{
          position: relative;
          top: 70px;
          left: 785px;
          height: 90px;
          width: 40px;
          border: 4px solid black;
          background-color: yellow;
        }
        .house-small-window{
          position: relative;
          top: 10px;
          left: 924px;
          height: 60px;
          width: 40px;
          border: 4px solid black;
          background-color: cyan;
        }
        .door{
          position: relative;
          top: 10px;
          left: 844px;
          height: 110px;
          width: 60px;
          border: 4px solid black;
          background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="house"></div>
    <div class="house-top"></div>
    <div class="house-window"></div>
    <div class="house-small-window"></div>
    <div class="door"></div>
</body>
</html>
