<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Elelment: static</title>
    <style>
        .box{
            position: static;
            height: 100px;
            width: 100px;
            border: 2px solid black;
            background-color: bisque;
            border-radius: 10px;
            box-shadow: 2px 2px 2px 5px black;
            margin-left: 40px;
            text-align: center;
            color: chocolate;
        }
        body{
            background-color: chocolate;
        }
    </style>
</head>
<body>
    <h2>Static Position</h2>
    <div class="box">static box </div>
</body>
</html>
